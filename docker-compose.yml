# ==============================================================
# Jekyll dev/build via Docker — 不需要本机装 Ruby/Jekyll
#
# 用法（在本文件所在目录运行）:
#   开发预览（带实时刷新）:   docker compose up jekyll
#       => http://localhost:4000
#   一次性构建（生成 _site）: docker compose run --rm build
#   清理:                     docker compose down -v
#
# 把当前目录整体挂到容器 /srv/jekyll，所以你在主机上改文件，
# 容器里直接看到，浏览器自动刷新。
# ==============================================================

services:
  # ---------- 开发服务：jekyll serve + livereload ----------
  jekyll:
    image: jekyll/jekyll:4.2.2
    container_name: xuanxuan-jekyll-dev
    ports:
      - "4000:4000"      # Jekyll 站点
      - "35729:35729"    # LiveReload
    volumes:
      - .:/srv/jekyll
      - bundle-cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
      - PAGES_REPO_NWO=xuanxuanwuhh/xuanxuanwuhh.github.io
    command: >
      bash -lc "
        bundle install --quiet &&
        jekyll serve
          --host 0.0.0.0
          --port 4000
          --livereload
          --livereload-port 35729
          --force_polling
          --incremental
      "
    restart: unless-stopped

  # ---------- 一次性构建：把站点构建到 ./_site ----------
  build:
    image: jekyll/jekyll:4.2.2
    container_name: xuanxuan-jekyll-build
    profiles: ["build"]   # 默认 up 不会启动它
    volumes:
      - .:/srv/jekyll
      - bundle-cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=production
    command: >
      bash -lc "
        bundle install --quiet &&
        jekyll build --trace --destination /srv/jekyll/_site
      "

volumes:
  bundle-cache:
