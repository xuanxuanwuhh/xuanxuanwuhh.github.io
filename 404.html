<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · 走丢了 · {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E">
    <style>
      .lost {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .lost h1 {
        font-size: clamp(6rem, 22vw, 14rem);
        font-weight: 800;
        line-height: 1;
        background: var(--grad-aurora);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 8px 50px rgba(168, 85, 247, 0.45));
        animation: glitch 2.4s infinite;
      }
      @keyframes glitch {
        0%, 100% { transform: translate(0,0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -2px); }
        60% { transform: translate(-1px, -1px); }
        80% { transform: translate(1px, 1px); }
      }
      .lost p { color: var(--text-secondary); margin: 1rem 0 1.5rem; }
    </style>
</head>
<body>
    <div class="starfield" aria-hidden="true"></div>
    <main class="lost container">
      <div>
        <h1>404</h1>
        <p>这个页面跑去外太空了 · You found the void.</p>
        <a href="{{ '/' | relative_url }}" class="btn btn-primary">⟵ 回到首页</a>
      </div>
    </main>
    <script>
      var sf = document.querySelector('.starfield');
      for (var i = 0; i < 120; i++) {
        var s = document.createElement('div');
        s.className = 'star' + (Math.random() > 0.85 ? ' big' : '');
        s.style.left = (Math.random()*100)+'%'; s.style.top = (Math.random()*100)+'%';
        s.style.animationDelay = (Math.random()*3)+'s';
        sf.appendChild(s);
      }
    </script>
</body>
</html>
