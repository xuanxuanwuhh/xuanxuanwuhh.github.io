<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | strip_html }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .post-header {
            margin-bottom: 2rem;
        }
        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .post-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .post-meta i {
            margin-right: 0.5rem;
        }
        .post-body {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .post-body h2 {
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            color: var(--text-primary);
        }
        .post-body h3 {
            font-size: 1.25rem;
            margin: 1.5rem 0 0.75rem;
            color: var(--text-primary);
        }
        .post-body p {
            margin-bottom: 1rem;
        }
        .post-body ul, .post-body ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .post-body li {
            margin-bottom: 0.5rem;
        }
        .post-body code {
            background: var(--bg-dark);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .post-body pre {
            background: var(--bg-dark);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .post-body pre code {
            background: transparent;
            padding: 0;
        }
        .post-body blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-color);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--secondary-color);
        }
        .back-link i {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">{{ site.title }}</div>
            <nav class="nav-links">
                <a href="/#home">首页</a>
                <a href="/#skills">技能</a>
                <a href="/#blog">博客</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <a href="/#blog" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回博客列表
            </a>
            
            <article class="post-content">
                <header class="post-header">
                    <h1 class="post-title">{{ page.title }}</h1>
                    <div class="post-meta">
                        <span><i class="fas fa-calendar"></i>{{ page.date | date: "%Y年%m月%d日" }}</span>
                        {% if page.categories %}
                        <span><i class="fas fa-tags"></i>{{ page.categories | join: ', ' }}</span>
                        {% endif %}
                    </div>
                </header>
                
                <div class="post-body">
                    {{ content }}
                </div>
            </article>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/#home">首页</a>
                <a href="/#skills">技能</a>
                <a href="/#blog">博客</a>
                <a href="/about">关于</a>
            </div>
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
